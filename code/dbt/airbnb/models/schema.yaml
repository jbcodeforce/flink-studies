models:
  - name: dim_listings_cleansed
    description: "Listings dimension"
    columns:
      - name: listing_id
        description: "Listing ID"
        data_tests:
          - not_null
          - unique
      - name: host_id
        description: "Host ID"
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_hosts_cleansed')
              field: host_id
      - name: room_type
        description: "Room Type"
        data_tests:
          - not_null
          - accepted_values:
              values: ['Private room', 'Entire home/apt', 'Shared room', 'Hotel room']
      - name: minimum_nights
        description: "Minimum Nights"
        data_tests:
          - not_null
          - min_value:
              value: 1