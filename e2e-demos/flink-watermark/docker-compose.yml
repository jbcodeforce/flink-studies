# Flink + Confluent 8.2 (KRaft, no ZooKeeper). Aligned with research/kafka-topic-consumer-offsets/docker-compose.yaml
# (combined broker+controller, PLAINTEXT; host: localhost:9092, in-stack: broker:29092).
#
#   docker compose up -d --build
networks:
  flink_wm_net: {}

services:
  broker:
    image: confluentinc/cp-kafka:8.2.0
    hostname: broker
    networks: [flink_wm_net]
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@broker:29093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_LISTENERS: "PLAINTEXT://broker:29092,CONTROLLER://broker:29093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "broker:29092"]
      interval: 10s
      timeout: 10s
      retries: 9
      start_period: 40s

  init-kafka:
    image: confluentinc/cp-kafka:8.2.0
    networks: [flink_wm_net]
    restart: "no"
    depends_on:
      broker:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        kafka-topics --create --if-not-exists \
          --topic watermark_demo --partitions 4 --replication-factor 1 \
          --bootstrap-server broker:29092
        echo "Topic watermark_demo ready (4 partitions)."

  jobmanager:
    build: .
    image: flink-wm:2.2.0
    container_name: flink_wm_jobmanager
    hostname: jobmanager
    networks: [flink_wm_net]
    depends_on:
      init-kafka:
        condition: service_completed_successfully
    ports:
      - "8081:8081"
    command: jobmanager
    volumes:
      - ./sql:/opt/flink-wm-sql:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8081/overview"]
      start_period: 30s
      interval: 5s
      timeout: 3s
      retries: 10
    environment: &flink-props
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 4

  taskmanager:
    image: flink-wm:2.2.0
    container_name: flink_wm_taskmanager
    hostname: taskmanager
    networks: [flink_wm_net]
    depends_on:
      jobmanager:
        condition: service_healthy
    command: taskmanager
    environment: *flink-props
