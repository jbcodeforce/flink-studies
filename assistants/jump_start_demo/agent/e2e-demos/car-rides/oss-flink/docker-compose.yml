# Minimal Kafka + Flink local stack for car-rides
networks:
  car-rides_net: {}

services:
  broker:
    image: confluentinc/cp-kafka:8.2.0
    hostname: broker
    networks: [car-rides_net]
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@broker:29093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_LISTENERS: "PLAINTEXT://broker:29092,CONTROLLER://broker:29093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "broker:29092"]
      interval: 10s
      timeout: 10s
      retries: 9
      start_period: 40s

  init-kafka:
    image: confluentinc/cp-kafka:8.2.0
    networks: [car-rides_net]
    restart: "no"
    depends_on:
      broker:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        kafka-topics --create --if-not-exists \
          --topic raw_rides --partitions 4 --replication-factor 1 \
          --bootstrap-server broker:29092
        echo "Topic raw_rides ready."

  jobmanager:
    image: flink:2.3.0-scala_2.12-java21
    container_name: car-rides_jobmanager
    networks: [car-rides_net]
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager

  taskmanager:
    image: flink:2.3.0-scala_2.12-java21
    container_name: car-rides_taskmanager
    networks: [car-rides_net]
    depends_on:
      - jobmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2
